name: Daily Agri Price Update

run-name: Daily Agri Price Update

on:
  schedule:
    # GitHub Actions scheduled workflow 實際觸發可能有明顯延遲。
    # 因此此處採提前排程，目標是讓實際執行時間接近：
    # 06:30、12:30、16:30、22:30。

    # 目標接近台灣時間 06:30，依實際延遲提前排程
    - cron: "30 5 * * *"
      timezone: "Asia/Taipei"

    # 目標接近台灣時間 12:30，依實際延遲提前排程
    - cron: "30 9 * * *"
      timezone: "Asia/Taipei"

    # 目標接近台灣時間 16:30，依實際延遲提前排程
    - cron: "30 13 * * *"
      timezone: "Asia/Taipei"

    # 目標接近台灣時間 22:30，依實際延遲提前排程
    - cron: "30 20 * * *"
      timezone: "Asia/Taipei"

  workflow_dispatch:

concurrency:
  group: daily-agri-price-update
  cancel-in-progress: false

jobs:
  update-agri-price:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_PARQUET_PREFIX: ${{ secrets.R2_PARQUET_PREFIX }}
      R2_REQUIRED: "true"
      SMARTBUY_API_MAX_RETRIES: "4"
      SMARTBUY_API_CONNECT_TIMEOUT: "30"
      SMARTBUY_API_READ_TIMEOUT: "90"
      SMARTBUY_API_PAGE_SIZE: "500"
      SMARTBUY_FETCH_LOOKBACK_DAYS: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run agri price update with retry
        shell: bash
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            if python scripts/update_agri_price_daily.py; then
              echo "Update succeeded"
              exit 0
            fi
            echo "Update failed, sleep before retry..."
            sleep 60
          done
          echo "Update failed after 3 attempts"
          exit 1