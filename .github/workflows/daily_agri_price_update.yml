name: Daily Agri Price Update

run-name: Daily Agri Price Update

on:
  schedule:
    - cron: "30 12 * * *"
      timezone: "Asia/Taipei"

  workflow_dispatch:

jobs:
  update-agri-price:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SMARTBUY_API_MAX_RETRIES: "4"
      SMARTBUY_API_CONNECT_TIMEOUT: "30"
      SMARTBUY_API_READ_TIMEOUT: "90"
      SMARTBUY_API_PAGE_SIZE: "500"
      SMARTBUY_FETCH_LOOKBACK_DAYS: "2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run agri price update
        run: |
          for i in {1..3}; do
            echo "Attempt $i of 3: running agri price update..."
            python scripts/update_agri_price_daily.py && exit 0
            if [ $i -lt 3 ]; then
              echo "Attempt $i failed. Waiting 10 seconds before next retry..."
              sleep 10
            fi
          done
          echo "All 3 attempts failed. Exiting with error."
          exit 1